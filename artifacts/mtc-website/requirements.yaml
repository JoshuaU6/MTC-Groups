packages:
  "framer-motion": "For premium page transitions and scroll-triggered animations"
  "embla-carousel-react": "For the auto-playing hero slideshow"
  "embla-carousel-autoplay": "For the auto-playing hero slideshow"
  "react-hook-form": "For robust contact form handling"
  "@hookform/resolvers": "For Zod validation with react-hook-form"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility to merge tailwind classes"

images:
  - path: "artifacts/mtc-website/public/images/logo.png"
    description: "A premium, minimalist geometric corporate logo for 'MTC Group', gold lines on a transparent background, luxury style"
    aspect_ratio: "1:1"
  - path: "artifacts/mtc-website/public/images/abstract-bg.png"
    description: "Abstract luxury corporate background with dark navy blue gradient and subtle glowing gold accents, elegant texture"
    aspect_ratio: "16:9"

notes:
  - Purely static frontend, simulating form submissions with local state and toasts.
  - Using wouter for routing.
  - Implemented luxury corporate theme (Navy & Gold).
