kind = "web"
previewPath = "/"
title = "MTC Group of Companies"
version = "1.0.0"
id = "artifacts/mtc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22051
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mtc-website run dev"

[services.env]
PORT = "22051"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mtc-website", "run", "build"]
publicDir = "artifacts/mtc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
